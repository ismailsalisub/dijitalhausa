<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Converter</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="shortcut icon" href="assets/logo.svg" type="image/x-icon" />
</head>
<body>
  <header>
  <img src="assets/logo.svg" alt="Logo">
  <div class="header-content">
    <h2>DigitalHausa</h2>
    <button class="menu-toggle" id="menuToggle" aria-label="Toggle Navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav id="mainNav">
      <a href="index.html">Home</a>
      <a href="dictionary.html">Dictionary</a>
      <a href="converter.html">Converter</a>
      <a href="stories.html">Stories</a>
      <a href="about.html">About</a>
    </nav>
  </div>
</header>

<main>
    <h1>Latin → Ajami Converter</h1>
    
    <div class="input-group">
  <textarea id='latin' placeholder="Fara rubuta Hausa anan... (Start typing Hausa here...)"></textarea>
  <div class="controls" style="margin-top: 10px;">
    <button id="clearBtn" style="background: #334155; color: white;">Clear All</button>
  </div>
    <div class="converter-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
  <h2 style="margin: 0; font-size: 1.1em; color: #9fb3c8;">Latin to Ajami Tool</h2>
  <a href="guidelines.html" style="color: #f0c94a; text-decoration: underline; font-size: 0.9em;">
    How to use (Guidelines)
  </a>
    </div>
</div>


    <div class="output-group" style="position: relative; margin-top: 20px;">
      <textarea id='out' dir='rtl' readonly placeholder="Ajami output..."></textarea>
      
      <button id="copyBtn" style="position: absolute; top: 10px; left: 10px; padding: 5px 10px; font-size: 0.8em; z-index: 5;">Copy</button>
    </div>
</main>


  <footer>
  <p>DigitalHausa — Preserving Hausa Language and Ajami Script</p>
  <button id="correctionBtn" style="background:transparent; color:#f0c94a; border:1px solid #f0c94a; margin-top:10px; font-size:0.8em;">
    Report a Correction
  </button>
</footer>

  <script src="js/converter.js"></script>
  <script src="js/main.js"></script>
</body>
